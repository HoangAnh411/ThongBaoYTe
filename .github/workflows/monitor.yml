name: Monitor Website

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Run monitor script
        run: node monitor.js
        env:
          ID: ${{ secrets.ID }}
          PASSWORD: ${{ secrets.PASSWORD }}
          EMAIL: ${{ secrets.EMAIL }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          RECEIVER: ${{ secrets.RECEIVER }}
          GITHUB_ACTIONS: true

      # 🔥 Commit ONLY data.txt nếu có thay đổi
      - name: Commit and push data.txt
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # reset mọi thay đổi ngoài data.txt
          git restore .

          # force add data.txt (dù bị ignore)
          git add -f data.txt

          # chỉ commit nếu data.txt thay đổi
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update data.txt [skip ci]"
            git push
          fi