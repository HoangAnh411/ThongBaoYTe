name: Monitor Website

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main

# 🔥 Cấp quyền cho GitHub Actions được phép push code lên repo
permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      # 🔥 Chạy script với các biến môi trường
      - name: Run monitor script
        run: node monitor.js
        env:
          ID: ${{ secrets.ID }}
          PASSWORD: ${{ secrets.PASSWORD }}
          EMAIL: ${{ secrets.EMAIL }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          RECEIVER: ${{ secrets.RECEIVER }}
          GITHUB_ACTIONS: true # Đảm bảo script không chạy vòng lặp setInterval

      # 🔥 Tự động lưu trạng thái bằng cách commit data.txt
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.txt
          
          # Kiểm tra xem file có thay đổi không. Nếu có thì commit với tag [skip ci] để tránh lặp vô hạn
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update data.txt [skip ci]" && git push)